<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feel Dance Team — My Account</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8; --ink: #1A1714; --gold: #C8A86B;
  --gold-light: #E8D5A8; --rose: #C4707A; --muted: #8A8178;
  --card: #FDFAF5; --border: rgba(200,168,107,0.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--cream); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 15px; }

header { padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--cream); z-index: 10; }
.logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; letter-spacing: .04em; }
.logo span { color: var(--gold); }
#logoutBtn { display: none; background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 16px; border-radius: 20px; cursor: pointer; }
#logoutBtn:hover { border-color: var(--gold); color: var(--ink); }

main { max-width: 680px; margin: 0 auto; padding: 40px 24px 80px; }

/* LOGIN */
#login { display: flex; flex-direction: column; align-items: center; padding-top: 60px; }
.eyebrow { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
.big-title { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 300; line-height: 1.1; text-align: center; margin-bottom: 8px; }
.big-title em { font-style: italic; color: var(--gold); }
.sub { color: var(--muted); font-size: 14px; margin-bottom: 44px; }
.form { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 12px; }
label { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
input[type=email] { width: 100%; padding: 14px 18px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--ink); outline: none; transition: border-color .2s; }
input[type=email]:focus { border-color: var(--gold); }
.btn { width: 100%; padding: 15px; background: var(--ink); color: var(--cream); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: background .2s; }
.btn:hover { background: #2e2a26; }
.btn:disabled { background: #b0a89e; cursor: not-allowed; }
.err { color: var(--rose); font-size: 13px; text-align: center; min-height: 18px; }

/* DASHBOARD */
#dash { display: none; }
.greeting { margin-bottom: 32px; }
.greeting-name { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 300; }
.greeting-name strong { font-weight: 600; }
.section-label { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }

/* PACKAGE CARD */
.pkg-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px 26px; margin-bottom: 14px; position: relative; overflow: hidden; }
.pkg-card.active { border-color: var(--gold); }
.pkg-card.active::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
.pkg-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; gap: 10px; }
.pkg-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; }
.badge { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; padding: 4px 11px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.badge-active { background: #E8F5E2; color: #4A7C3F; }
.badge-low { background: #FDF0E8; color: #C4704A; }
.badge-done { background: #F0EDE8; color: var(--muted); }
.big-num { font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 300; line-height: 1; }
.big-num span { font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--muted); font-weight: 300; }
.progress-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.of-total { font-size: 13px; color: var(--muted); }
.bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
.bar-fill.low { background: linear-gradient(90deg, var(--rose), #E8A0A6); }
.meta-row { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 16px; }
.meta-item .ml { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.meta-item .mv { font-size: 14px; font-weight: 500; }

/* STUDENT HEADER */
.student-header { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; margin: 24px 0 12px; color: var(--ink); }

/* LESSONS */
.lesson-row { display: flex; align-items: center; gap: 14px; padding: 11px 14px; background: var(--card); border-radius: 10px; margin-bottom: 2px; }
.lesson-date { flex-shrink: 0; width: 90px; }
.lesson-date .d { font-size: 14px; font-weight: 500; }
.lesson-date .wd { font-size: 12px; color: var(--muted); }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-done { background: var(--gold); }
.dot-cancel { background: #ddd; }
.dot-upcoming { background: var(--rose); }
.lesson-info { flex: 1; }
.lesson-info .lt { font-size: 14px; }
.lesson-info .tc { font-size: 12px; color: var(--muted); }
.chip { font-size: 11px; padding: 3px 10px; border-radius: 12px; white-space: nowrap; }
.chip-done { background: #E8F5E2; color: #4A7C3F; }
.chip-cancel { background: #F0EDE8; color: var(--muted); }
.chip-upcoming { background: #FDF0E8; color: #C4704A; }

/* CONTACT */
.contact { background: var(--ink); color: var(--cream); border-radius: 16px; padding: 24px 26px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-top: 32px; }
.contact .cl { font-size: 13px; color: rgba(245,240,232,.5); margin-bottom: 4px; }
.contact .cn { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; }
.contact a { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--gold); color: var(--ink); border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 500; }

.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; margin: 32px auto; }
.empty { text-align: center; padding: 32px; color: var(--muted); }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
#dash { animation: fadeIn .4s ease; }
</style>
</head>
<body>
<header>
  <div class="logo">Feel <span>Dance</span> Team</div>
  <button id="logoutBtn" onclick="logout()">Sign out</button>
</header>
<main>
  <!-- LOGIN -->
  <div id="login">
    <div class="eyebrow">My Account</div>
    <h1 class="big-title">Wel<em>come</em></h1>
    <p class="sub">Enter the email address used at registration</p>
    <div class="form">
      <div>
        <label for="emailInput">Email</label>
        <input type="email" id="emailInput" placeholder="example@gmail.com"
               onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
      <div class="err" id="errMsg"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash">
    <div class="greeting">
      <div class="eyebrow">My Account</div>
      <div class="greeting-name">Hi, <strong id="greetName"></strong></div>
    </div>
    <div class="section-label">Lesson Packages</div>
    <div id="pkgsWrap"></div>
    <div id="lessonsWrap" style="display:none">
      <div class="section-label" style="margin-top:32px">Lesson History</div>
      <div id="lessonsList"></div>
    </div>
    <div class="contact">
      <div>
        <div class="cl">Questions about your package?</div>
        <div class="cn">Feel Dance Team</div>
      </div>
      <a href="mailto:billing@feeldance.team">✉ Contact us</a>
    </div>
  </div>
</main>

<script>
const BASE = 'appfL8SfWPrqO7cv0';
const TOKEN = 'patfZW4UH5A7VAnU4.fc66875f8f721c2170139f0df0c3e274b8a6310c25ef70cd1e8b8a1e7ecbd112';

// Table IDs
const T_STUDENTS = 'tblKuHmZSYQRUOEQC';
const T_PACKAGES = 'tblKSkS8ne6qkAmX7';
const T_LESSONS  = 'tblMP0uBvfrKOhqCg';

// Field IDs
const F = {
  // Students
  S_NAME:   'fldTzI9jzT1YCT0og',
  S_EMAIL:  'fldikM98uh0BJwcBu',
  S_PARENT: 'fldxYddypKkc3HT4E',
  // Packages
  P_STUDENT: 'fldxoXnOsy1tVM5s1',
  P_LEFT:    'flddm5nEmXhQ6Pbo3',
  P_TOTAL:   'fld3fxBbFL4dlhY9S',
  P_CURRENT: 'fldGmtvY2ES9yuwXH',
  P_ITEM:    'fld4cJh34S9mZLbz0',
  P_COMMENT: 'fld0sXLEHpZg5pt3E',
  P_USED:    'fldh0O3XLHtlq7uUl',
  P_NUM:     'fldpqZhICjegoJKbM',
  // Lessons
  L_STUDENT: 'fldWZbAs9kMbjvxd6',
  L_DATE:    'fldTchzVskoD8qxlH',
  L_TEACHER: 'fldlYzVOJxHk15xKb',
  L_STATUS:  'fldEULlUDCGEkFkfc',
  L_TYPE:    'fldchKXdibelRJv9U',
};

let students = [];

// ── API ──────────────────────────────────────────────────
async function api(table, params = {}) {
  const url = new URL(`https://api.airtable.com/v0/${BASE}/${table}`);
  for (const [k, v] of Object.entries(params)) {
    if (k === 'fields') {
      v.forEach(f => url.searchParams.append('fields[]', f));
    } else if (k === 'sort') {
      v.forEach((s, i) => {
        url.searchParams.set(`sort[${i}][field]`, s.field);
        url.searchParams.set(`sort[${i}][direction]`, s.direction || 'asc');
      });
    } else {
      url.searchParams.set(k, v);
    }
  }
  const r = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(`${r.status}: ${txt}`);
  }
  return r.json();
}

// ── LOGIN ────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('emailInput').value.trim().toLowerCase();
  if (!email) { setErr('Please enter your email'); return; }
  
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Searching...';
  setErr('');

  try {
    // Search all students with this email
    const formula = `LOWER({${F.S_EMAIL}})="${email.replace(/"/g,'\\"')}"`;
    const data = await api(T_STUDENTS, {
      filterByFormula: formula,
      fields: ['Student', 'Email', 'Parent Name'],
      maxRecords: 10
    });

    if (!data.records || data.records.length === 0) {
      setErr('Email not found. Please check spelling or contact the studio.');
      return;
    }

    students = data.records;
    const parentName = data.records[0].fields['Parent Name']
                    || data.records[0].fields['Student']
                    || 'there';
    const firstName = parentName.split(' ')[0];

    document.getElementById('greetName').textContent = firstName;
    document.getElementById('login').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    document.getElementById('logoutBtn').style.display = 'inline-block';

    loadPackages();
  } catch(e) {
    console.error(e);
    setErr('Connection error. Please try again.');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

// ── PACKAGES ─────────────────────────────────────────────
async function loadPackages() {
  const wrap = document.getElementById('pkgsWrap');
  wrap.innerHTML = '<div class="spinner"></div>';

  const ids = students.map(s => s.id);

  try {
    // Build OR formula for all student IDs
    // Use FIND on the linked record field
    const names = students.map(s => s.fields['Student'] || s.fields[F.S_NAME] || '').filter(Boolean);
    const nameChecks = names.map(n => `{${F.P_STUDENT}} = "${n.replace(/"/g,'\\"')}"`).join(',');
    const formula = names.length === 1
      ? `{${F.P_STUDENT}} = "${names[0].replace(/"/g,'\\"')}"`
      : `OR(${nameChecks})`;

    const data = await api(T_PACKAGES, {
      filterByFormula: formula,
      fields: [F.P_STUDENT, F.P_LEFT, F.P_TOTAL, F.P_CURRENT, F.P_ITEM, F.P_COMMENT, F.P_USED, F.P_NUM],
      maxRecords: 50
    });

    const pkgs = data.records || [];
    wrap.innerHTML = '';

    if (pkgs.length === 0) {
      wrap.innerHTML = '<div class="empty">No packages found</div>';
      return;
    }

    if (students.length > 1) {
      // Group by student
      students.forEach(s => {
        const sp = pkgs.filter(p => (p.fields[F.P_STUDENT] || []).includes(s.id));
        if (!sp.length) return;
        const h = document.createElement('div');
        h.className = 'student-header';
        h.textContent = s.fields['Student'] || s.fields[F.S_NAME] || 'Student';
        wrap.appendChild(h);
        const active = sp.filter(p => p.fields[F.P_CURRENT]);
        const past   = sp.filter(p => !p.fields[F.P_CURRENT]);
        [...active, ...past.slice(0,2)].forEach(p => wrap.appendChild(pkgCard(p)));
      });
    } else {
      const active = pkgs.filter(p => p.fields[F.P_CURRENT]);
      const past   = pkgs.filter(p => !p.fields[F.P_CURRENT]);
      [...active, ...past.slice(0,3)].forEach(p => wrap.appendChild(pkgCard(p)));
    }

    loadLessons();
  } catch(e) {
    console.error('Package error:', e);
    wrap.innerHTML = `<div class="empty">Error: ${esc(e.message)}</div>`;
  }
}

function pkgCard(pkg) {
  const f = pkg.fields;
  const left  = parseFloat(f[F.P_LEFT]) || 0;
  const total = parseFloat(f[F.P_TOTAL]) || 0;
  const used  = parseFloat(f[F.P_USED]) || 0;
  const cur   = !!f[F.P_CURRENT];
  const low   = cur && left <= 2;
  const pct   = total > 0 ? Math.round((left / total) * 100) : 0;

  const items = f[F.P_ITEM];
  const name  = (Array.isArray(items) && items[0]) ? items[0]
              : (f[F.P_COMMENT] || `Package #${f[F.P_NUM]}`);

  const badge = cur
    ? (low ? '<span class="badge badge-low">Running low</span>'
           : '<span class="badge badge-active">Active</span>')
    : '<span class="badge badge-done">Completed</span>';

  const div = document.createElement('div');
  div.className = `pkg-card ${cur ? 'active' : ''}`;
  div.innerHTML = `
    <div class="pkg-top">
      <div class="pkg-name">${esc(name)}</div>
      ${badge}
    </div>
    <div class="progress-row">
      <div class="big-num">${left} <span>lessons left</span></div>
      <div class="of-total">of ${total}</div>
    </div>
    <div class="bar"><div class="bar-fill ${low?'low':''}" style="width:${pct}%"></div></div>
    ${used > 0 ? `<div class="meta-row">
      <div class="meta-item"><div class="ml">Completed</div><div class="mv">${used} lessons</div></div>
      <div class="meta-item"><div class="ml">Total</div><div class="mv">${total} lessons</div></div>
    </div>` : ''}
  `;
  return div;
}

// ── LESSONS ──────────────────────────────────────────────
async function loadLessons() {
  const wrap = document.getElementById('lessonsWrap');
  const list = document.getElementById('lessonsList');
  wrap.style.display = 'block';
  list.innerHTML = '<div class="spinner"></div>';

  const ids = students.map(s => s.id);

  try {
    const names = students.map(s => s.fields['Student'] || s.fields[F.S_NAME] || '').filter(Boolean);
    const nameChecks = names.map(n => `{${F.L_STUDENT}} = "${n.replace(/"/g,'\\"')}"`).join(',');
    const formula = names.length === 1
      ? `{${F.L_STUDENT}} = "${names[0].replace(/"/g,'\\"')}"`
      : `OR(${nameChecks})`;

    const data = await api(T_LESSONS, {
      filterByFormula: formula,
      fields: [F.L_DATE, F.L_TEACHER, F.L_STATUS, F.L_TYPE],
      maxRecords: 15
    });

    list.innerHTML = '';
    const lessons = data.records || [];

    if (!lessons.length) {
      list.innerHTML = '<div class="empty" style="padding:16px">No lessons yet</div>';
      return;
    }

    lessons.forEach(l => list.appendChild(lessonRow(l)));
  } catch(e) {
    wrap.style.display = 'none';
  }
}

function lessonRow(les) {
  const f = les.fields;
  const ds = f[F.L_DATE] || '';
  const status = (f[F.L_STATUS] || '').toLowerCase();
  const teacher = f[F.L_TEACHER] || '';
  const type = f[F.L_TYPE] || 'Individual lesson';

  const d = ds ? new Date(ds + 'T12:00:00') : null;
  const dateStr = d ? d.toLocaleDateString('en-US', { day: 'numeric', month: 'short' }) : '—';
  const wday = d ? d.toLocaleDateString('en-US', { weekday: 'short' }) : '';

  let dotC, chipC, chipL;
  if (status.includes('cancel')) {
    dotC='dot-cancel'; chipC='chip-cancel'; chipL='Cancelled';
  } else if (!d || d > new Date()) {
    dotC='dot-upcoming'; chipC='chip-upcoming'; chipL='Upcoming';
  } else {
    dotC='dot-done'; chipC='chip-done'; chipL='Done';
  }

  const row = document.createElement('div');
  row.className = 'lesson-row';
  row.innerHTML = `
    <div class="lesson-date"><div class="d">${dateStr}</div><div class="wd">${wday}</div></div>
    <div class="dot ${dotC}"></div>
    <div class="lesson-info"><div class="lt">${esc(type)}</div>${teacher?`<div class="tc">${esc(teacher)}</div>`:''}</div>
    <span class="chip ${chipC}">${chipL}</span>
  `;
  return row;
}

// ── LOGOUT ───────────────────────────────────────────────
function logout() {
  students = [];
  document.getElementById('dash').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('emailInput').value = '';
  document.getElementById('pkgsWrap').innerHTML = '';
  document.getElementById('lessonsList').innerHTML = '';
  document.getElementById('lessonsWrap').style.display = 'none';
}

function setErr(msg) { document.getElementById('errMsg').textContent = msg; }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
